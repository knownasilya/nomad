name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: volta-cli/action@v5

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3-dev \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2-dev

      - name: Install node-gyp globally
        run: npm install -g node-gyp

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== Checking main bundle ==="
          if grep -q 'protocol.handle("nomad"' app/main.build.js; then
            echo "✓ protocol.handle found in main.build.js"
          else
            echo "✗ protocol.handle MISSING — build may be stale or failed"
            exit 1
          fi
          echo "=== Checking preload ==="
          test -f app/fg/webview-preload/index.build.js && echo "✓ preload bundle exists" || (echo "✗ preload bundle MISSING" && exit 1)

      - name: Package and upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass secrets as neutral names; the run script wires them conditionally
          # to avoid setting CSC_LINK='' which electron-builder resolves to CWD.
          _MAC_CERTS: ${{ secrets.MAC_CERTS }}
          _MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          _APPLE_ID: ${{ secrets.APPLE_ID }}
          _APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$_MAC_CERTS" ]; then
            export CSC_LINK="$_MAC_CERTS"
            export CSC_KEY_PASSWORD="$_MAC_CERTS_PASSWORD"
            export appleId="$_APPLE_ID"
            export appleIdPassword="$_APPLE_ID_PASSWORD"
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npx electron-builder --publish always
