name: Release

on:
  push:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: volta-cli/action@v5

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3-dev \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2-dev

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Package and upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (optional — unsigned builds skip notarization)
          CSC_LINK: ${{ secrets.MAC_CERTS || '' }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD || '' }}
          # macOS notarization (only runs when CSC_LINK is set)
          appleId: ${{ secrets.APPLE_ID || '' }}
          appleIdPassword: ${{ secrets.APPLE_ID_PASSWORD || '' }}
        run: npx electron-builder --publish never
